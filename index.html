<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BossMind Apps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }
    .grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 20px 40px;
      background: #111;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn:hover {
      background: #222;
    }
  </style>
</head>

<body>

<h1>BossMind Apps</h1>

<div id="apps" class="grid"></div>

<script>
fetch('/bossmind.config.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('apps');

    data.projects.forEach(app => {
      const btn = document.createElement('div');
      btn.className = 'btn';
      btn.innerText = app.name;
      btn.onclick = () => {
        window.location.href = app.path + '/';
      };
      container.appendChild(btn);
    });
  });
</script>
<script>
fetch('/supervisor.json')
  .then(res => res.json())
  .then(supervisor => {
    console.log('Supervisor Active:', supervisor.engine);
  });
</script>
</body>
</html>
