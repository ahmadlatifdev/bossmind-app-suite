<!DOCTYPE html>
<html>
<head>
  <title>BossMind Apps</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }
    .grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 20px 40px;
      background: #111;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn:hover {
      background: #222;
    }
  </style>
</head>
<body>

<h1>BossMind Apps</h1>

<div class="grid">
  <div class="btn" onclick="openApp('resumora')">Resumora</div>
  <div class="btn" onclick="openApp('elegancyart-builder')">ElegancyArt Builder</div>
  <div class="btn" onclick="openApp('ai-video-generator')">AI Video Generator</div>
  <div class="btn" onclick="openApp('tiktok-ai')">TikTok AI</div>
  <div class="btn" onclick="openApp('global-stock')">Global Stock</div>
</div>

<script>
function openApp(folder) {
  window.location.href = "/" + folder + "/";
}
</script>

</body>
</html>
